name: satisfactory-lens-dev
services:
  satisfactory-lens:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DEV_MODE=true
    image: satisfactory-lens:dev
    container_name: satisfactory-lens-dev
    ports:
      - "5181:80"
    volumes:
      # Mount backend source for live reload via tsx watch
      - ./backend/src:/app/backend/src
      # Mount built frontend (run `npm run build -- --watch` in frontend/)
      - ./frontend/dist:/usr/share/nginx/html
      # Always use dev supervisor config regardless of image build args
      - ./supervisor/supervisord.dev.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      - TZ=America/New_York
      # App auth — disabled in dev. If you set ENABLE_LOGIN=true, also set a strong
      # SESSION_SECRET (openssl rand -hex 32); the backend refuses the placeholder.
      - ENABLE_LOGIN=false
      - USERNAME=admin
      - PASSWORD=changeme
      - SESSION_SECRET=dev-secret-not-for-production
      - SF_HOST=
      - SF_PORT=7777
      - SF_PASSWORD=
      - ENABLE_AUTO_WATCH=true # flag (never auto-reload) when a newer save appears — watches the mount dir, or polls the API if not mounted
      - SAVE_POLL_INTERVAL_SECONDS=30 # how often to poll the API for a newer save when not mounted
      - LOG_LEVEL=debug # trace = full SF API request/response bodies
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
