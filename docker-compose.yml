name: satisfactory-lens
services:
  satisfactory-lens:
    # Prebuilt image from CI (push to main). Build from source via docker-compose.dev.yml.
    image: parmati/satisfactory-lens:latest
    container_name: satisfactory-lens
    ports:
      - "5180:80"
    # Optional: mount a save folder for local-disk access (otherwise loaded via the SF API).
    # volumes:
    #   - /path/to/satisfactory/saves:/app/saves:ro
    environment:
      - TZ=America/New_York
      # Auth is off by default. To enable, set ENABLE_LOGIN=true with a real PASSWORD and a
      # strong SESSION_SECRET (openssl rand -hex 32) — the backend won't start on the default.
      - ENABLE_LOGIN=false
      - USERNAME=admin
      - PASSWORD=changeme
      - VIEWER_PASSWORD=          # optional read-only login (see README)
      - SESSION_SECRET=change-me-in-production
      # SF server. Set SF_HOST to auto-connect on startup, or leave blank to connect via the UI.
      - SF_HOST=
      - SF_PORT=7777
      - SF_PASSWORD=
      # Flag (don't auto-reload) when a newer save appears; poll interval for API mode.
      - ENABLE_AUTO_WATCH=true
      - SAVE_POLL_INTERVAL_SECONDS=30
      # Logging. LOG_LEVEL: trace|debug|info|warn|error (trace = full SF API bodies).
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
