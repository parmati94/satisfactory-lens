name: satisfactory-lens
services:
  satisfactory-lens:
    build: .
    image: satisfactory-lens:latest
    container_name: satisfactory-lens
    ports:
      - "5180:80"
    # volumes:
    #   - /path/to/satisfactory/saves:/app/saves:ro
    environment:
      - TZ=America/New_York
      # App auth (set ENABLE_LOGIN=true to require username/password to access the UI)
      - ENABLE_LOGIN=false
      - USERNAME=admin
      - PASSWORD=changeme
      - SESSION_SECRET=change-me-in-production
      # Satisfactory dedicated server
      # Set SF_HOST to auto-connect on startup, or leave blank to connect via the UI
      - SF_HOST=
      - SF_PORT=7777
      - SF_PASSWORD=
      - SF_ALLOW_SELF_SIGNED=true
      # Save viewer — defaults to loading the latest save via the SF API once connected
      # (no volume needed). Uncomment the volume above (host path → /app/saves) to read
      # from disk instead; a mounted save always takes precedence over the API when present.
      - ENABLE_AUTO_WATCH=true # flag (never auto-reload) when a newer save appears — watches the mount dir, or polls the API if not mounted
      - SAVE_POLL_INTERVAL_SECONDS=30 # how often to poll the API for a newer save when not mounted
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
