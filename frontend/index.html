<!-- Saves: master-detail. On lg+ it's a two-pane split — save browser rail on the
     left, the Explorer (inspect/edit the selected save) on the right. Below lg the
     Explorer is the full-screen default and the browser becomes a left slide-out
     drawer (savesDrawerOpen), opened by the edge handle and closed on selection. -->
<div x-show="activeTab === 'saves'" class="container mx-auto px-4 py-6 max-w-6xl lg:max-w-[92rem]">
  <div class="lg:flex lg:items-start">

    <!-- Drawer scrim (mobile only) -->
    <div
      x-show="savesDrawerOpen"
      x-transition.opacity
      @click="savesDrawerOpen = false"
      class="fixed inset-0 z-30 bg-black/60 lg:hidden"
    ></div>

    <!-- Edge handle: pull the saves drawer out (mobile only, when closed). The save
         icon denotes what's behind it; the chevron hints it pulls out. -->
    <button
      x-show="!savesDrawerOpen"
      @click="savesDrawerOpen = true"
      aria-label="Show saves"
      class="lg:hidden fixed left-0 top-1/2 -translate-y-1/2 z-20 flex flex-col items-center justify-center gap-1.5 h-20 w-7 rounded-r-xl bg-gray-900/55 backdrop-blur-sm border border-l-0 border-gray-600/40 text-gray-300/90 shadow-lg hover:bg-gray-900/80 hover:text-white transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
      <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
    </button>

    <!-- Save browser: static rail on lg+, off-canvas slide-out drawer below that -->
    <div
      class="fixed top-14 bottom-0 left-0 z-40 w-[88%] max-w-sm overflow-y-auto bg-gray-950 border-r border-gray-800 px-4 py-4 transform transition-transform duration-200 ease-out
             lg:sticky lg:top-16 lg:bottom-auto lg:z-auto lg:max-w-none lg:shrink-0 lg:overflow-hidden lg:bg-gray-900/30 lg:rounded-2xl lg:transform-none lg:transition-all lg:duration-300 lg:ease-in-out"
      :class="{
        'translate-x-0': savesDrawerOpen,
        '-translate-x-full lg:translate-x-0': !savesDrawerOpen,
        'lg:w-96 lg:mr-6 lg:p-3 lg:border': !savesRailCollapsed,
        'lg:w-0 lg:mr-0 lg:p-0 lg:border-0 lg:opacity-0 lg:pointer-events-none': savesRailCollapsed
      }"
    >
      <!-- Drawer header (mobile only) -->
      <div class="flex items-center justify-between mb-3 lg:hidden">
        <span class="text-sm font-semibold text-gray-200">Saves</span>
        <button @click="savesDrawerOpen = false" aria-label="Close saves" class="p-1.5 -mr-1 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-gray-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <!-- Fixed inner width on lg+ (= w-96 minus the lg:p-3 padding) so the content keeps
           its layout while the rail's width animates to 0 — the rail just clips it (clean
           wipe) instead of the content reflowing/squeezing narrower-and-taller mid-collapse.
           The vertical scroll lives here (not the rail) so its scrollbar sits inside the
           fixed width — otherwise it'd steal width from the rail's content box and force a
           phantom horizontal scrollbar. -->
      <div class="lg:w-[22.5rem] lg:max-h-[calc(100vh-8.5rem)] lg:overflow-y-auto lg:overflow-x-hidden">
        {{> saves-tab }}
      </div>
    </div>

    <!-- Explorer: full-width default on mobile; right pane on lg+ -->
    <div class="min-w-0 lg:flex-1">
      {{> save-viewer-tab }}
    </div>
  </div>
</div>
