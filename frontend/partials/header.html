<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-40">
  <div class="container mx-auto px-4 py-3 max-w-6xl flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold text-orange-400">Satisfactory Lens</h1>
      <span
        x-show="sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-800"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        <span x-text="sfStatus.host"></span>
      </span>
      <span
        x-show="!sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-gray-800 text-gray-500 border border-gray-700"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span>
        Not connected
      </span>
    </div>
    <div class="flex items-center gap-2">
      <button
        x-show="!sfStatus.connected"
        @click="showConnectModal = true"
        class="px-3 py-1.5 text-sm bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors font-medium"
      >
        Connect
      </button>
      <button
        x-show="sfStatus.connected"
        @click="disconnect()"
        class="px-3 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg transition-colors"
      >
        Disconnect
      </button>
    </div>
  </div>
</header>
