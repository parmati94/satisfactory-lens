<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-40">
  <div class="container mx-auto px-4 max-w-6xl flex items-stretch justify-between h-14 gap-3">
    <!-- Left: logo + primary tabs -->
    <div class="flex items-stretch gap-1 min-w-0">
      <button
        @click="switchTab('dashboard')"
        title="Go to Dashboard"
        class="flex items-center gap-2.5 group rounded-lg -ml-1 px-1 hover:bg-gray-800/60 transition-colors shrink-0"
      >
        <div class="h-8 w-8 flex items-center justify-center bg-gray-800 rounded-lg border border-accent-500/40 flex-shrink-0 p-1 group-hover:border-accent-500/70 transition-colors">
          <img src="/img/favicon/apple-touch-icon.png" alt="Satisfactory Lens logo" class="w-full h-full object-contain rounded-md">
        </div>
        <h1 class="text-lg font-display font-bold tracking-tight leading-none whitespace-nowrap">
          <span class="text-gray-200">Satisfactory</span><span class="bg-gradient-to-r from-accent-300 to-accent-500 bg-clip-text text-transparent drop-shadow-[0_0_8px_rgb(var(--accent-500)_/_0.35)] group-hover:drop-shadow-[0_0_13px_rgb(var(--accent-400)_/_0.6)] transition-all duration-300"> Lens</span>
        </h1>
      </button>

      <div class="w-px self-center h-6 bg-gray-800 mx-2 shrink-0"></div>

      <nav class="flex items-stretch gap-1">
        <button
          @click="switchTab('dashboard')"
          :class="activeTab === 'dashboard' ? 'border-accent-400 text-accent-400' : 'border-transparent text-gray-400 hover:text-gray-200'"
          class="flex items-center px-3 text-sm font-medium border-b-2 transition-colors"
        >
          Dashboard
        </button>
        <button
          @click="switchTab('saveviewer')"
          :class="activeTab === 'saveviewer' ? 'border-accent-400 text-accent-400' : 'border-transparent text-gray-400 hover:text-gray-200'"
          class="flex items-center px-3 text-sm font-medium border-b-2 transition-colors"
        >
          Save Tools
          <span
            x-show="saveStatus?.loaded && sseConnected"
            class="ml-1.5 inline-block w-1.5 h-1.5 rounded-full bg-green-400"
          ></span>
        </button>
        <button
          @click="switchTab('map')"
          :class="activeTab === 'map' ? 'border-accent-400 text-accent-400' : 'border-transparent text-gray-400 hover:text-gray-200'"
          class="flex items-center px-3 text-sm font-medium border-b-2 transition-colors"
        >
          Map
        </button>
        <button
          @click="switchTab('saves')"
          :class="activeTab === 'saves' ? 'border-accent-400 text-accent-400' : 'border-transparent text-gray-400 hover:text-gray-200'"
          class="flex items-center px-3 text-sm font-medium border-b-2 transition-colors"
        >
          Saves
        </button>
      </nav>
    </div>

    <!-- Right: connection status + actions -->
    <div class="flex items-center gap-2 min-w-0">
      <!-- Connection status: light indicator; hover reveals host + session, click opens the server panel -->
      <button
        x-show="sfStatus.connected"
        @click="openServerPanel()"
        @mouseenter="showTooltip($event, sfStatus.host + (serverState?.serverGameState?.activeSessionName ? '   ·   ' + serverState.serverGameState.activeSessionName : ''), null, 'bottom')"
        @mouseleave="hideTooltip()"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full bg-green-900/40 text-green-400 border border-green-800/70 hover:bg-green-900/60 transition-colors shrink-0"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        <span class="hidden sm:inline">Connected</span>
      </button>
      <button
        x-show="!sfStatus.connected"
        @click="showConnectModal = true"
        class="px-3 py-1.5 text-sm bg-accent-500 hover:bg-accent-600 text-white rounded-lg transition-colors font-medium shrink-0"
      >
        Connect
      </button>
      <button
        x-show="sfStatus.connected && saveStatus?.loaded"
        @click="headerReloadSave()"
        :disabled="headerReloading || editCount > 0"
        @mouseenter="showTooltip($event, editCount > 0 ? 'Reload disabled while editing — save or cancel first' : reloadTooltipText(), null, 'bottom')"
        @mouseleave="hideTooltip()"
        class="relative p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group disabled:opacity-50 shrink-0"
      >
        <svg
          class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors"
          :class="headerReloading ? 'animate-spin' : ''"
          fill="none" stroke="currentColor" viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <span
          x-show="newerSaveAvailable"
          class="absolute top-1 right-1 w-2 h-2 rounded-full bg-amber-400 ring-2 ring-gray-900 animate-pulse"
        ></span>
      </button>
      <!-- Server panel (live state + config) -->
      <button
        @click="openServerPanel()"
        title="Server"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group shrink-0"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12V7a2 2 0 012-2h10a2 2 0 012 2v5M5 12h14M5 12a2 2 0 00-2 2v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 00-2-2M8 16h.01M12 16h.01M8 8h.01M12 8h.01" />
        </svg>
      </button>
      <!-- App settings (theme & client prefs) -->
      <button
        @click="showAppSettings = true"
        title="App settings"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group shrink-0"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>

      <!-- Exit group: disconnect from the SF server / log out of the UI -->
      <div x-show="sfStatus.connected || loginEnabled" class="w-px self-center h-6 bg-gray-800 mx-1 shrink-0"></div>
      <button
        x-show="sfStatus.connected"
        @click="disconnect()"
        title="Disconnect from server"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group shrink-0"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9" />
        </svg>
      </button>
      <button
        x-show="loginEnabled"
        @click="logout()"
        title="Log out"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group shrink-0"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </div>
</header>
