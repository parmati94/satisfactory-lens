<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-40">
  <div class="container mx-auto px-4 py-3 max-w-6xl flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold text-orange-400">Satisfactory Lens</h1>
      <span
        x-show="sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-800"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        <span x-text="sfStatus.host"></span>
      </span>
      <span
        x-show="!sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-gray-800 text-gray-500 border border-gray-700"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span>
        Not connected
      </span>
    </div>
    <div class="flex items-center gap-2">
      <button
        x-show="!sfStatus.connected"
        @click="showConnectModal = true"
        class="px-3 py-1.5 text-sm bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors font-medium"
      >
        Connect
      </button>
      <button
        x-show="sfStatus.connected"
        @click="disconnect()"
        class="px-3 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg transition-colors"
      >
        Disconnect
      </button>
      <button
        @click="showSettings = true; if (sfStatus.connected && !serverOptions) loadSettings()"
        title="Server Settings"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </div>
</header>
