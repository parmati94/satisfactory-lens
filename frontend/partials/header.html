<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-40">
  <div class="container mx-auto px-4 py-3 max-w-6xl flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 flex items-center justify-center bg-gray-800 rounded-lg border border-orange-500/40 flex-shrink-0 p-1">
        <img src="/img/favicon/apple-touch-icon.png" alt="Satisfactory Lens logo" class="w-full h-full object-contain rounded-md">
      </div>
      <h1 class="text-xl font-bold text-orange-400">Satisfactory Lens</h1>
      <span
        x-show="sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-800"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        <span x-text="sfStatus.host"></span>
      </span>
      <span
        x-show="sfStatus.connected && serverState?.serverGameState?.activeSessionName"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-gray-800 text-gray-300 border border-gray-700"
      >
        <svg class="w-3 h-3 text-orange-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
        </svg>
        <span x-text="serverState?.serverGameState?.activeSessionName"></span>
      </span>
      <span
        x-show="!sfStatus.connected"
        class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-0.5 rounded-full bg-gray-800 text-gray-500 border border-gray-700"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span>
        Not connected
      </span>
    </div>
    <div class="flex items-center gap-2">
      <button
        x-show="!sfStatus.connected"
        @click="showConnectModal = true"
        class="px-3 py-1.5 text-sm bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors font-medium"
      >
        Connect
      </button>
      <button
        x-show="sfStatus.connected"
        @click="disconnect()"
        class="px-3 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg transition-colors"
      >
        Disconnect
      </button>
      <button
        x-show="sfStatus.connected && saveStatus?.loaded"
        @click="headerReloadSave()"
        :disabled="headerReloading || editCount > 0"
        @mouseenter="showTooltip($event, editCount > 0 ? 'Reload disabled while editing — save or cancel first' : reloadTooltipText(), null, 'bottom')"
        @mouseleave="hideTooltip()"
        class="relative p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group disabled:opacity-50"
      >
        <svg
          class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors"
          :class="headerReloading ? 'animate-spin' : ''"
          fill="none" stroke="currentColor" viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <span
          x-show="newerSaveAvailable"
          class="absolute top-1 right-1 w-2 h-2 rounded-full bg-amber-400 ring-2 ring-gray-900 animate-pulse"
        ></span>
      </button>
      <button
        @click="showSettings = true; if (sfStatus.connected && !serverOptions) loadSettings()"
        title="Server Settings"
        class="p-1.5 hover:bg-gray-700/60 rounded-lg transition-colors group"
      >
        <svg class="w-5 h-5 text-gray-400 group-hover:text-gray-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </div>
</header>
