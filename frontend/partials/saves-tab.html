<div x-show="activeTab === 'saves'" class="container mx-auto px-4 py-6 max-w-6xl">

  <!-- Not connected -->
  <div x-show="!sfStatus.connected" class="text-center py-20">
    <p class="text-gray-500 text-sm">Connect to your server to manage saves.</p>
  </div>

  <div x-show="sfStatus.connected">

    <!-- Action result banner -->
    <div
      x-show="actionResult"
      x-transition
      :class="actionResult?.ok ? 'bg-green-900/30 border-green-800 text-green-300' : 'bg-red-900/30 border-red-800 text-red-300'"
      class="p-3 border rounded-lg text-sm mb-5 flex items-center justify-between"
    >
      <span x-text="actionResult?.message"></span>
      <button @click="actionResult = null" class="text-current opacity-60 hover:opacity-100 ml-4">✕</button>
    </div>

    <!-- Header row -->
    <div class="flex items-center justify-between mb-5">
      <div>
        <h2 class="text-base font-semibold text-gray-200">Save Files</h2>
        <p class="text-xs text-gray-500 mt-0.5" x-show="saves?.sessions?.length">
          <span x-text="saves?.sessions?.length ?? 0"></span> world<span x-show="(saves?.sessions?.length ?? 0) !== 1">s</span>
          · <span x-text="saves?.sessions?.reduce((n, s) => n + (s.saveHeaders?.length ?? 0), 0) ?? 0"></span> saves total
        </p>
      </div>
      <div class="flex items-center gap-2">
        <!-- Create save -->
        <div class="flex gap-2">
          <input
            type="text"
            x-model="newSaveName"
            placeholder="Save name…"
            @keydown.enter="triggerSave()"
            class="w-44 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-orange-400 transition-colors placeholder-gray-600"
          />
          <button
            @click="triggerSave()"
            :disabled="actionLoading || !newSaveName.trim()"
            class="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors"
          >
            <span x-show="!actionLoading">Save Now</span>
            <span x-show="actionLoading">Saving…</span>
          </button>
        </div>
        <button
          @click="saves = null; loadSaves()"
          class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-gray-800 rounded-lg transition-colors"
          title="Refresh"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </div>

    <div x-show="loading" class="text-center py-10 text-gray-500 text-sm animate-pulse">Loading saves…</div>
    <div
      x-show="error && !loading"
      class="p-4 bg-red-900/30 border border-red-800 rounded-lg text-red-300 text-sm"
      x-text="error"
    ></div>

    <!-- Session accordions -->
    <div x-show="saves && !loading" class="space-y-3">
      <template x-for="session in saves?.sessions ?? []" :key="session.sessionName">
        <div
          x-data="{
            get isActive() { return session.sessionName.toLowerCase() === $store?.app?.serverState?.serverGameState?.activeSessionName?.toLowerCase()
              || session.sessionName === serverState?.serverGameState?.activeSessionName; },
            get open() { return this.isActive || (saves?.sessions?.length ?? 0) === 1; },
            set open(v) { this._open = v; },
            _open: null,
            get expanded() { return this._open !== null ? this._open : (this.isActive || (saves?.sessions?.length ?? 0) === 1); },
            toggle() { this._open = !this.expanded; },
            isAutosave(saveName) { return /_autosave_\d+$/i.test(saveName); },
            manualSaves(headers) { return headers.filter(s => !this.isAutosave(s.saveName)); },
            autosaves(headers) { return headers.filter(s => this.isAutosave(s.saveName)); },
            isProtectedAutosave(saveName, headers) {
              const autos = this.autosaves(headers);
              const idx = autos.findIndex(s => s.saveName === saveName);
              return idx >= 0 && idx < 3;
            },
            latestDate(headers) { return headers[0]?.saveDateTime ?? ''; },
            prettyName(name) { return name.charAt(0).toUpperCase() + name.slice(1); },
          }"
          class="bg-gray-900 border rounded-xl overflow-hidden transition-colors"
          :class="isActive ? 'border-orange-500/40' : 'border-gray-700'"
        >

          <!-- Session header -->
          <button
            @click="toggle()"
            class="w-full flex items-center gap-3 px-5 py-4 text-left hover:bg-gray-800/40 transition-colors"
          >
            <!-- Chevron -->
            <svg
              class="w-4 h-4 text-gray-500 shrink-0 transition-transform duration-200"
              :class="expanded ? 'rotate-90' : ''"
              fill="none" stroke="currentColor" viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>

            <!-- Name + active badge -->
            <div class="flex items-center gap-2 min-w-0 flex-1">
              <span class="font-semibold text-white text-sm" x-text="prettyName(session.sessionName)"></span>
              <span
                x-show="isActive"
                class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-orange-500/20 text-orange-400 border border-orange-500/30"
              >
                <span class="w-1.5 h-1.5 rounded-full bg-orange-400 animate-pulse"></span>
                Active
              </span>
            </div>

            <!-- Meta summary -->
            <div class="flex items-center gap-4 text-xs text-gray-500 shrink-0">
              <span x-text="formatDuration(session.saveHeaders?.[0]?.playDurationSeconds)"></span>
              <span x-text="(session.saveHeaders?.length ?? 0) + ' saves'"></span>
              <span class="text-gray-600" x-show="latestDate(session.saveHeaders ?? [])">
                <span x-text="formatSaveDate(latestDate(session.saveHeaders ?? []))"></span>
              </span>
            </div>
          </button>

          <!-- Save list -->
          <div x-show="expanded" x-transition:enter="transition-all duration-150" class="border-t border-gray-800">

            <!-- Manual saves -->
            <template x-if="manualSaves(session.saveHeaders ?? []).length > 0">
              <div>
                <div class="px-5 pt-3 pb-1.5 text-xs font-semibold text-gray-500 uppercase tracking-wider flex items-center gap-2">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                  </svg>
                  Manual Saves
                </div>
                <div class="px-3 pb-3 divide-y divide-gray-800/60">
                  <template x-for="save in manualSaves(session.saveHeaders ?? [])" :key="save.saveName">
                    <div
                      class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors group"
                      :class="saveStatus?.sourceName === save.saveName
                        ? 'bg-sky-500/5 hover:bg-sky-500/10 border border-sky-500/10'
                        : (save.saveName === globalLatestSaveName() ? 'bg-orange-500/5 hover:bg-orange-500/10 border border-orange-500/10' : 'hover:bg-gray-800/60')"
                    >
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                          <span class="text-sm text-white font-medium truncate" x-text="save.saveName"></span>
                          <span
                            x-show="save.saveName === globalLatestSaveName()"
                            class="text-xs px-1.5 py-0.5 rounded bg-orange-900/40 text-orange-400 border border-orange-500/30 shrink-0"
                          >latest</span>
                          <span
                            x-show="saveStatus?.sourceName === save.saveName"
                            title="Currently loaded in Save Viewer"
                            class="inline-flex items-center justify-center w-5 h-5 rounded bg-sky-900/40 text-sky-300 border border-sky-500/30 shrink-0"
                          >
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                          </span>
                        </div>
                        <div class="flex items-center gap-2 mt-0.5">
                          <span class="text-xs text-gray-400" x-text="formatSaveDate(save.saveDateTime)"></span>
                          <span class="text-xs text-gray-600">·</span>
                          <span class="text-xs text-gray-500" x-text="formatDuration(save.playDurationSeconds)"></span>
                        </div>
                      </div>
                      <div class="flex items-center gap-1.5 shrink-0">
                        <span x-show="save.isModdedSave" class="text-xs px-1.5 py-0.5 rounded bg-yellow-900/40 text-yellow-400 border border-yellow-800/50">modded</span>
                        <span x-show="save.isEditedSave" class="text-xs px-1.5 py-0.5 rounded bg-blue-900/40 text-blue-400 border border-blue-800/50">edited</span>
                        <span x-show="save.isCreativeModeEnabled" class="text-xs px-1.5 py-0.5 rounded bg-purple-900/40 text-purple-400 border border-purple-800/50">creative</span>
                        <button
                          @click="inspectSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Load into the Save Viewer for inspection — does not affect the server"
                          class="flex items-center gap-1 px-3 py-1 text-xs bg-sky-500/10 hover:bg-sky-500/20 disabled:opacity-50 disabled:cursor-not-allowed text-sky-300 rounded-md transition-colors opacity-0 group-hover:opacity-100"
                        >
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                          Inspect
                        </button>
                        <button
                          @click="loadSave(session.sessionName, save.saveName)"
                          :disabled="actionLoading"
                          title="Switch the live server to this save"
                          class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed text-gray-300 rounded-md transition-colors opacity-0 group-hover:opacity-100"
                        >Load to Server</button>
                        <button
                          @click="deleteSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Delete save"
                          class="p-1 text-gray-600 hover:text-red-400 disabled:opacity-50 disabled:cursor-not-allowed rounded transition-colors opacity-0 group-hover:opacity-100"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Autosaves -->
            <template x-if="autosaves(session.saveHeaders ?? []).length > 0">
              <div>
                <div class="px-5 pt-3 pb-1.5 text-xs font-semibold text-gray-500 uppercase tracking-wider flex items-center gap-2"
                  :class="manualSaves(session.saveHeaders ?? []).length > 0 ? 'border-t border-gray-800/60 mt-1' : ''"
                >
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  Autosaves
                </div>
                <div class="px-3 pb-3 divide-y divide-gray-800/60">
                  <template x-for="save in autosaves(session.saveHeaders ?? [])" :key="save.saveName">
                    <div
                      class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors group"
                      :class="saveStatus?.sourceName === save.saveName
                        ? 'bg-sky-500/5 hover:bg-sky-500/10 border border-sky-500/10'
                        : (save.saveName === globalLatestSaveName() ? 'bg-orange-500/5 hover:bg-orange-500/10 border border-orange-500/10' : 'hover:bg-gray-800/60')"
                    >
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                          <span class="text-sm text-white font-medium truncate" x-text="save.saveName"></span>
                          <span
                            x-show="save.saveName === globalLatestSaveName()"
                            class="text-xs px-1.5 py-0.5 rounded bg-orange-900/40 text-orange-400 border border-orange-500/30 shrink-0"
                          >latest</span>
                          <span
                            x-show="saveStatus?.sourceName === save.saveName"
                            title="Currently loaded in Save Viewer"
                            class="inline-flex items-center justify-center w-5 h-5 rounded bg-sky-900/40 text-sky-300 border border-sky-500/30 shrink-0"
                          >
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                          </span>
                        </div>
                        <div class="flex items-center gap-2 mt-0.5">
                          <span class="text-xs text-gray-400" x-text="formatSaveDate(save.saveDateTime)"></span>
                          <span class="text-xs text-gray-600">·</span>
                          <span class="text-xs text-gray-500" x-text="formatDuration(save.playDurationSeconds)"></span>
                        </div>
                      </div>
                      <div class="flex items-center gap-1.5 shrink-0">
                        <span x-show="save.isModdedSave" class="text-xs px-1.5 py-0.5 rounded bg-yellow-900/40 text-yellow-400 border border-yellow-800/50">modded</span>
                        <span x-show="save.isEditedSave" class="text-xs px-1.5 py-0.5 rounded bg-blue-900/40 text-blue-400 border border-blue-800/50">edited</span>
                        <span x-show="save.isCreativeModeEnabled" class="text-xs px-1.5 py-0.5 rounded bg-purple-900/40 text-purple-400 border border-purple-800/50">creative</span>
                        <button
                          @click="inspectSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Load into the Save Viewer for inspection — does not affect the server"
                          class="flex items-center gap-1 px-3 py-1 text-xs bg-sky-500/10 hover:bg-sky-500/20 disabled:opacity-50 disabled:cursor-not-allowed text-sky-300 rounded-md transition-colors opacity-0 group-hover:opacity-100"
                        >
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                          Inspect
                        </button>
                        <button
                          @click="loadSave(session.sessionName, save.saveName)"
                          :disabled="actionLoading"
                          title="Switch the live server to this save"
                          class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed text-gray-300 rounded-md transition-colors opacity-0 group-hover:opacity-100"
                        >Load to Server</button>
                        <!-- Protected autosave: lock icon -->
                        <span
                          x-show="isProtectedAutosave(save.saveName, session.saveHeaders ?? [])"
                          title="Protected — one of the 3 most recent autosaves"
                          class="p-1 text-gray-700 opacity-0 group-hover:opacity-100"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                          </svg>
                        </span>
                        <!-- Deletable autosave: trash icon -->
                        <button
                          x-show="!isProtectedAutosave(save.saveName, session.saveHeaders ?? [])"
                          @click="deleteSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Delete save"
                          class="p-1 text-gray-600 hover:text-red-400 disabled:opacity-50 disabled:cursor-not-allowed rounded transition-colors opacity-0 group-hover:opacity-100"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

          </div>
        </div>
      </template>

      <div x-show="!saves?.sessions?.length && !loading" class="text-center py-10 text-gray-500 text-sm">No saves found.</div>
    </div>
  </div>
</div>
