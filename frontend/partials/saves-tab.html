<div>

  <!-- Not connected -->
  <div x-show="!sfStatus.connected" class="text-center py-20">
    <p class="text-gray-500 text-sm">Connect to your server to manage saves.</p>
  </div>

  <div x-show="sfStatus.connected">

    <!-- Action result banner -->
    <div
      x-show="actionResult"
      x-transition
      :class="actionResult?.ok ? 'bg-ok-900/30 border-ok-800 text-ok-300' : 'bg-danger-900/30 border-danger-800 text-danger-300'"
      class="p-3 border rounded-lg text-sm mb-5 flex items-center justify-between"
    >
      <span x-text="actionResult?.message"></span>
      <button @click="actionResult = null" class="text-current opacity-60 hover:opacity-100 ml-4">✕</button>
    </div>

    <!-- Header row -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
      <div>
        <h2 class="text-base font-semibold text-gray-200">Save Files</h2>
        <p class="text-xs text-gray-500 mt-0.5" x-show="saves?.sessions?.length">
          <span x-text="saves?.sessions?.length ?? 0"></span> world<span x-show="(saves?.sessions?.length ?? 0) !== 1">s</span>
          · <span x-text="saves?.sessions?.reduce((n, s) => n + (s.saveHeaders?.length ?? 0), 0) ?? 0"></span> saves total
        </p>
      </div>
      <div class="flex items-center gap-2">
        <!-- Create save -->
        <div class="flex gap-2">
          <input
            type="text"
            x-model="newSaveName"
            placeholder="Save name…"
            @keydown.enter="triggerSave()"
            class="w-44 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-accent-400 transition-colors placeholder-gray-600"
          />
          <button
            @click="triggerSave()"
            :disabled="actionLoading || !newSaveName.trim()"
            class="px-3 py-1.5 bg-accent-500 hover:bg-accent-600 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors"
          >
            <span x-show="!creatingSave">Save Now</span>
            <span x-show="creatingSave">Saving…</span>
          </button>
        </div>
        <button
          @click="saves = null; loadSaves()"
          class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-gray-800 rounded-lg transition-colors"
          title="Refresh"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
        <!-- Collapse the rail (lg+ only) — hides it to give the Explorer full width -->
        <button @click="toggleSavesRail()" aria-label="Collapse saves" title="Collapse panel"
          class="hidden lg:inline-flex p-1.5 text-accent-400 hover:text-accent-300 rounded-lg transition-colors">
          <svg class="w-4 h-4 drop-shadow-[0_0_5px_rgb(var(--accent-400)/0.7)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
        </button>
      </div>
    </div>

    <div x-show="loading" class="text-center py-10 text-gray-500 text-sm animate-pulse">Loading saves…</div>
    <div
      x-show="error && !loading"
      class="p-4 bg-danger-900/30 border border-danger-800 rounded-lg text-danger-300 text-sm"
      x-text="error"
    ></div>

    <!-- Session accordions — blurred behind a lockout while edits are staged, since
         inspecting or loading another save would orphan the current save's edits
         (their targets are instanceNames in the loaded save). -->
    <div x-show="saves && !loading" class="relative">
      <div class="space-y-3 transition-[filter,opacity] duration-200"
           :class="editCount > 0 ? 'blur-[3px] opacity-50 pointer-events-none select-none' : ''">
      <template x-for="session in saves?.sessions ?? []" :key="session.sessionName">
        <div
          x-data="{
            get isActive() { return session.sessionName.toLowerCase() === $store?.app?.serverState?.serverGameState?.activeSessionName?.toLowerCase()
              || session.sessionName === serverState?.serverGameState?.activeSessionName; },
            get open() { return this.isActive || (saves?.sessions?.length ?? 0) === 1; },
            set open(v) { this._open = v; },
            _open: null,
            get expanded() { return this._open !== null ? this._open : (this.isActive || (saves?.sessions?.length ?? 0) === 1); },
            toggle() { this._open = !this.expanded; },
            isAutosave(saveName) { return /_autosave_\d+$/i.test(saveName); },
            manualSaves(headers) { return headers.filter(s => !this.isAutosave(s.saveName)); },
            autosaves(headers) { return headers.filter(s => this.isAutosave(s.saveName)); },
            isProtectedAutosave(saveName, headers) {
              const autos = this.autosaves(headers);
              const idx = autos.findIndex(s => s.saveName === saveName);
              return idx >= 0 && idx < 3;
            },
            latestDate(headers) { return headers[0]?.saveDateTime ?? ''; },
            prettyName(name) { return name.charAt(0).toUpperCase() + name.slice(1); },
          }"
          class="bg-gray-900 border rounded-xl overflow-hidden transition-colors"
          :class="isActive ? 'border-accent-500/40' : 'border-gray-700'"
        >

          <!-- Session header — stacked so the name keeps the full (narrow) rail width -->
          <button
            @click="toggle()"
            class="w-full flex items-start gap-2.5 px-4 py-3 text-left hover:bg-gray-800/40 transition-colors"
          >
            <!-- Chevron -->
            <svg
              class="mt-0.5 w-4 h-4 text-gray-500 shrink-0 transition-transform duration-200"
              :class="expanded ? 'rotate-90' : ''"
              fill="none" stroke="currentColor" viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>

            <div class="min-w-0 flex-1">
              <!-- Line 1: name + active badge -->
              <div class="flex items-center gap-2 min-w-0">
                <span class="font-semibold text-white text-sm truncate" x-text="prettyName(session.sessionName)"></span>
                <span
                  x-show="isActive"
                  title="Active session"
                  class="shrink-0 inline-flex items-center gap-1 text-[10px] font-medium px-1.5 py-px rounded-full bg-accent-500/20 text-accent-300 border border-accent-500/30"
                >
                  <span class="w-1.5 h-1.5 rounded-full bg-accent-400 animate-pulse"></span>
                  Active
                </span>
              </div>
              <!-- Line 2: save count · playtime · latest date -->
              <div class="flex items-center gap-1.5 text-xs text-gray-500 mt-0.5 min-w-0">
                <span class="shrink-0" x-text="(session.saveHeaders?.length ?? 0) + ' saves'"></span>
                <template x-if="session.saveHeaders?.[0]?.playDurationSeconds">
                  <span class="flex items-center gap-1.5 shrink-0">
                    <span class="text-gray-600">·</span>
                    <span x-text="formatDuration(session.saveHeaders?.[0]?.playDurationSeconds)"></span>
                  </span>
                </template>
                <template x-if="latestDate(session.saveHeaders ?? [])">
                  <span class="flex items-center gap-1.5 min-w-0">
                    <span class="text-gray-600">·</span>
                    <span class="truncate" x-text="formatSaveDate(latestDate(session.saveHeaders ?? []))"></span>
                  </span>
                </template>
              </div>
            </div>
          </button>

          <!-- Save list -->
          <div x-show="expanded" x-transition:enter="transition-all duration-150" class="border-t border-gray-800">

            <!-- Manual saves -->
            <template x-if="manualSaves(session.saveHeaders ?? []).length > 0">
              <div>
                <div class="px-5 pt-3 pb-1.5 text-xs font-semibold text-gray-500 uppercase tracking-wider flex items-center gap-2">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                  </svg>
                  Manual Saves
                </div>
                <div class="px-3 pb-3 divide-y divide-gray-800/60">
                  <template x-for="save in manualSaves(session.saveHeaders ?? [])" :key="save.saveName">
                    <div
                      @click="inspectSave(save.saveName, save.saveDateTime); savesDrawerOpen = false"
                      role="button" tabindex="0"
                      @keydown.enter="inspectSave(save.saveName, save.saveDateTime); savesDrawerOpen = false"
                      title="Inspect in the Explorer — does not affect the server"
                      class="group relative flex flex-col gap-0.5 px-3 py-2 rounded-lg cursor-pointer transition-colors"
                      :class="saveStatus?.sourceName === save.saveName
                        ? 'bg-sky-500/10 hover:bg-sky-500/15 border border-sky-500/20'
                        : (save.saveName === globalLatestSaveName() ? 'bg-accent-500/5 hover:bg-accent-500/10 border border-accent-500/10' : 'border border-transparent hover:bg-gray-800/60')"
                    >
                      <!-- Line 1: name + status (loaded eye / latest) — pr leaves room for the hover actions -->
                      <div class="flex items-center gap-1.5 min-w-0 pr-16">
                        <span class="text-sm text-white font-medium truncate" x-text="save.saveName"></span>
                        <span x-show="saveStatus?.sourceName === save.saveName" title="Loaded in the Explorer" class="shrink-0 text-sky-300">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </span>
                        <span x-show="save.saveName === globalLatestSaveName()" class="shrink-0 text-[10px] font-medium px-1.5 py-px rounded bg-accent-900/40 text-accent-300 border border-accent-500/30">latest</span>
                      </div>
                      <!-- Line 2: date · duration + source-type dots (modded/edited/creative) -->
                      <div class="flex items-center gap-2 min-w-0">
                        <span class="text-xs text-gray-400 truncate" x-text="formatSaveDate(save.saveDateTime)"></span>
                        <span class="text-xs text-gray-600 shrink-0">·</span>
                        <span class="text-xs text-gray-500 shrink-0" x-text="formatDuration(save.playDurationSeconds)"></span>
                        <span class="flex items-center gap-1 ml-auto shrink-0">
                          <span x-show="save.isModdedSave" title="Modded save" class="w-1.5 h-1.5 rounded-full bg-warn-400"></span>
                          <span x-show="save.isEditedSave" title="Edited save" class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                          <span x-show="save.isCreativeModeEnabled" title="Creative mode" class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                        </span>
                      </div>
                      <!-- Hover actions (icon-only, tooltips): absolute so they never steal width from the name -->
                      <div class="absolute top-1.5 right-1.5 flex items-center gap-0.5 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                        <button
                          @click.stop="loadSave(session.sessionName, save.saveName)"
                          :disabled="actionLoading || editCount > 0"
                          :title="editCount > 0 ? 'Finish editing first — save or discard staged changes before loading' : 'Load to Server — switches the live server to this save'"
                          class="p-1.5 rounded-md bg-gray-800/80 hover:bg-gray-700 text-gray-300 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12V7a2 2 0 012-2h10a2 2 0 012 2v5M5 12h14M5 12a2 2 0 00-2 2v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 00-2-2M8 16h.01M12 16h.01M8 8h.01M12 8h.01" /></svg>
                        </button>
                        <button
                          @click.stop="deleteSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Delete save"
                          class="p-1.5 rounded-md bg-gray-800/80 hover:bg-gray-700 text-gray-400 hover:text-danger-400 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Autosaves -->
            <template x-if="autosaves(session.saveHeaders ?? []).length > 0">
              <div>
                <div class="px-5 pt-3 pb-1.5 text-xs font-semibold text-gray-500 uppercase tracking-wider flex items-center gap-2"
                  :class="manualSaves(session.saveHeaders ?? []).length > 0 ? 'border-t border-gray-800/60 mt-1' : ''"
                >
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  Autosaves
                </div>
                <div class="px-3 pb-3 divide-y divide-gray-800/60">
                  <template x-for="save in autosaves(session.saveHeaders ?? [])" :key="save.saveName">
                    <div
                      @click="inspectSave(save.saveName, save.saveDateTime); savesDrawerOpen = false"
                      role="button" tabindex="0"
                      @keydown.enter="inspectSave(save.saveName, save.saveDateTime); savesDrawerOpen = false"
                      title="Inspect in the Explorer — does not affect the server"
                      class="group relative flex flex-col gap-0.5 px-3 py-2 rounded-lg cursor-pointer transition-colors"
                      :class="saveStatus?.sourceName === save.saveName
                        ? 'bg-sky-500/10 hover:bg-sky-500/15 border border-sky-500/20'
                        : (save.saveName === globalLatestSaveName() ? 'bg-accent-500/5 hover:bg-accent-500/10 border border-accent-500/10' : 'border border-transparent hover:bg-gray-800/60')"
                    >
                      <!-- Line 1: name + status (loaded eye / latest) — pr leaves room for the hover actions -->
                      <div class="flex items-center gap-1.5 min-w-0 pr-16">
                        <span class="text-sm text-white font-medium truncate" x-text="save.saveName"></span>
                        <span x-show="saveStatus?.sourceName === save.saveName" title="Loaded in the Explorer" class="shrink-0 text-sky-300">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </span>
                        <span x-show="save.saveName === globalLatestSaveName()" class="shrink-0 text-[10px] font-medium px-1.5 py-px rounded bg-accent-900/40 text-accent-300 border border-accent-500/30">latest</span>
                      </div>
                      <!-- Line 2: date · duration + source-type dots (modded/edited/creative) -->
                      <div class="flex items-center gap-2 min-w-0">
                        <span class="text-xs text-gray-400 truncate" x-text="formatSaveDate(save.saveDateTime)"></span>
                        <span class="text-xs text-gray-600 shrink-0">·</span>
                        <span class="text-xs text-gray-500 shrink-0" x-text="formatDuration(save.playDurationSeconds)"></span>
                        <span class="flex items-center gap-1 ml-auto shrink-0">
                          <span x-show="save.isModdedSave" title="Modded save" class="w-1.5 h-1.5 rounded-full bg-warn-400"></span>
                          <span x-show="save.isEditedSave" title="Edited save" class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                          <span x-show="save.isCreativeModeEnabled" title="Creative mode" class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                        </span>
                      </div>
                      <!-- Hover actions (icon-only, tooltips): absolute so they never steal width from the name -->
                      <div class="absolute top-1.5 right-1.5 flex items-center gap-0.5 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                        <button
                          @click.stop="loadSave(session.sessionName, save.saveName)"
                          :disabled="actionLoading || editCount > 0"
                          :title="editCount > 0 ? 'Finish editing first — save or discard staged changes before loading' : 'Load to Server — switches the live server to this save'"
                          class="p-1.5 rounded-md bg-gray-800/80 hover:bg-gray-700 text-gray-300 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12V7a2 2 0 012-2h10a2 2 0 012 2v5M5 12h14M5 12a2 2 0 00-2 2v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 00-2-2M8 16h.01M12 16h.01M8 8h.01M12 8h.01" /></svg>
                        </button>
                        <!-- Protected autosave: lock (one of the 3 most recent) -->
                        <span
                          x-show="isProtectedAutosave(save.saveName, session.saveHeaders ?? [])"
                          title="Protected — one of the 3 most recent autosaves"
                          class="p-1.5 text-gray-600"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </span>
                        <!-- Deletable autosave: trash -->
                        <button
                          x-show="!isProtectedAutosave(save.saveName, session.saveHeaders ?? [])"
                          @click.stop="deleteSave(save.saveName, save.saveDateTime)"
                          :disabled="actionLoading"
                          title="Delete save"
                          class="p-1.5 rounded-md bg-gray-800/80 hover:bg-gray-700 text-gray-400 hover:text-danger-400 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        >
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

          </div>
        </div>
      </template>

      <div x-show="!saves?.sessions?.length && !loading" class="text-center py-10 text-gray-500 text-sm">No saves found.</div>
      </div>

      <!-- Editing lockout — the blur lives on the list above; this card (sticky so
           it follows scroll) explains why and offers save/discard right here. -->
      <div x-show="editCount > 0" x-transition.opacity
           class="absolute inset-0 z-10 flex justify-center pointer-events-none" style="display:none">
        <div class="pointer-events-auto sticky top-4 self-start mx-2 max-w-[18rem] rounded-xl border border-accent-500/30 bg-gray-900/85 backdrop-blur-md p-4 text-center shadow-[0_0_22px_-4px_rgb(var(--accent-500)/0.3),0_14px_30px_-10px_rgba(0,0,0,0.7)]">
          <svg class="w-6 h-6 mx-auto text-accent-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <p class="text-sm font-semibold text-gray-100">Locked while editing</p>
          <p class="text-xs text-gray-400 mt-1">Save or discard your
            <span class="text-accent-300 font-medium" x-text="editCount"></span>
            staged change<span x-show="editCount !== 1">s</span> to open or load another save.</p>
          <div class="flex items-center justify-center gap-2 mt-3">
            <button @click="cancelEdits()"
              class="text-xs font-medium px-3 py-1.5 rounded-lg border border-gray-600/60 text-gray-300 hover:bg-gray-700/50 transition-colors">Discard</button>
            <button @click="openPersistModal()"
              class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-accent-500 hover:bg-accent-400 text-white transition-colors">Save changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
