<!-- Settings modal -->
<div
  x-show="showSettings"
  x-transition:enter="transition ease-out duration-150"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-100"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
  @click.self="showSettings = false"
  @keydown.escape.window="showSettings = false"
>
  <div class="bg-gray-800 rounded-2xl w-full max-w-lg border border-gray-700 shadow-2xl flex flex-col max-h-[80vh]">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700 flex-shrink-0">
      <h2 class="text-base font-bold text-gray-100">Server Settings</h2>
      <div class="flex items-center gap-3">
        <button
          x-show="sfStatus.connected"
          @click="serverOptions = null; advancedSettings = null; loadSettings()"
          class="text-xs text-gray-500 hover:text-gray-300 transition-colors"
        >↻ Refresh</button>
        <button @click="showSettings = false" class="p-1 hover:bg-gray-700 rounded-lg transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="overflow-y-auto px-6 py-5 space-y-4">

      <!-- Not connected -->
      <div x-show="!sfStatus.connected" class="text-center py-10">
        <p class="text-gray-500 text-sm">Connect to your server to view settings.</p>
        <button
          @click="showSettings = false; showConnectModal = true"
          class="mt-4 px-4 py-2 text-sm bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-colors font-medium"
        >Connect Now</button>
      </div>

      <div x-show="sfStatus.connected">
        <div x-show="loading" class="text-center py-10 text-gray-500 text-sm animate-pulse">Loading settings…</div>
        <div
          x-show="error && !loading"
          class="p-4 bg-red-900/30 border border-red-800 rounded-lg text-red-300 text-sm"
          x-text="error"
        ></div>

        <div x-show="serverOptions && !loading" class="space-y-4">

          <!-- Server Options -->
          <div class="bg-gray-750 rounded-xl p-4 border border-gray-700">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Server Options</h3>
            <div>
              <template x-for="[key, value] in Object.entries(serverOptions?.serverOptions ?? {})" :key="key">
                <div class="flex justify-between items-center py-2 border-b border-gray-700/50 last:border-0">
                  <span class="text-gray-400 font-mono text-xs" x-text="key"></span>
                  <span class="text-white font-mono text-xs" x-text="value"></span>
                </div>
              </template>
              <div x-show="!Object.keys(serverOptions?.serverOptions ?? {}).length" class="text-gray-500 text-sm py-2">No options returned.</div>
            </div>
          </div>

          <!-- Advanced Game Settings -->
          <div class="bg-gray-750 rounded-xl p-4 border border-gray-700" x-show="advancedSettings">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Advanced Game Settings</h3>
            <div>
              <template x-for="[key, value] in Object.entries(advancedSettings?.advancedGameSettings ?? {})" :key="key">
                <div class="flex justify-between items-center py-2 border-b border-gray-700/50 last:border-0">
                  <span class="text-gray-400 font-mono text-xs" x-text="key"></span>
                  <span class="text-white font-mono text-xs" x-text="value"></span>
                </div>
              </template>
              <div x-show="!Object.keys(advancedSettings?.advancedGameSettings ?? {}).length" class="text-gray-500 text-sm py-2">No advanced settings returned.</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
