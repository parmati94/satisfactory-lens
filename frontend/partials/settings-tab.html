<div x-show="activeTab === 'settings'" class="container mx-auto px-4 py-6 max-w-6xl">

  <!-- Not connected -->
  <div x-show="!sfStatus.connected" class="text-center py-20">
    <p class="text-gray-500 text-sm">Connect to your server to view settings.</p>
  </div>

  <div x-show="sfStatus.connected">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-semibold text-gray-200">Server Settings</h2>
      <button @click="serverOptions = null; advancedSettings = null; loadSettings()" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">↻ Refresh</button>
    </div>

    <div x-show="loading" class="text-center py-10 text-gray-500 text-sm animate-pulse">Loading settings…</div>
    <div
      x-show="error && !loading"
      class="p-4 bg-red-900/30 border border-red-800 rounded-lg text-red-300 text-sm mb-5"
      x-text="error"
    ></div>

    <div x-show="serverOptions && !loading" class="space-y-4">

      <!-- Server Options -->
      <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Server Options</h3>
        <div class="space-y-0">
          <template x-for="[key, value] in Object.entries(serverOptions?.serverOptions ?? {})" :key="key">
            <div class="flex justify-between items-center text-sm py-2.5 border-b border-gray-700/50 last:border-0">
              <span class="text-gray-400 font-mono text-xs" x-text="key"></span>
              <span class="text-white font-mono text-xs" x-text="value"></span>
            </div>
          </template>
          <div x-show="!Object.keys(serverOptions?.serverOptions ?? {}).length" class="text-gray-500 text-sm py-2">No options returned.</div>
        </div>
      </div>

      <!-- Advanced Game Settings -->
      <div class="bg-gray-800 rounded-xl p-5 border border-gray-700" x-show="advancedSettings">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Advanced Game Settings</h3>
        <div class="space-y-0">
          <template x-for="[key, value] in Object.entries(advancedSettings?.advancedGameSettings ?? {})" :key="key">
            <div class="flex justify-between items-center text-sm py-2.5 border-b border-gray-700/50 last:border-0">
              <span class="text-gray-400 font-mono text-xs" x-text="key"></span>
              <span class="text-white font-mono text-xs" x-text="value"></span>
            </div>
          </template>
          <div x-show="!Object.keys(advancedSettings?.advancedGameSettings ?? {}).length" class="text-gray-500 text-sm py-2">No advanced settings returned.</div>
        </div>
      </div>

    </div>
  </div>
</div>
