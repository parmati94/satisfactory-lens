<!-- App Settings modal — client-side preferences (theme, …) -->
<div
  x-show="showAppSettings"
  x-transition:enter="transition ease-out duration-150"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-100"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1100] flex items-center justify-center p-4"
  @click.self="showAppSettings = false"
  @keydown.escape.window="showAppSettings = false"
  x-cloak
>
  <div class="bg-gray-800 rounded-2xl w-full max-w-md border border-gray-700 shadow-2xl overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700/70">
      <div class="flex items-center gap-2.5">
        <svg class="w-5 h-5 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <h2 class="text-base font-semibold text-white">App Settings</h2>
      </div>
      <button @click="showAppSettings = false" class="p-1 text-gray-500 hover:text-gray-300 rounded-md hover:bg-gray-700/60 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-5">
      <!-- Accent theme -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <h3 class="text-sm font-semibold text-gray-200">Accent color</h3>
          <span class="text-xs text-gray-500" x-text="themes.find(t => t.id === theme)?.label"></span>
        </div>
        <p class="text-xs text-gray-500 mb-3">Re-tints the whole app. Saved on this device.</p>
        <div class="flex items-center gap-3">
          <template x-for="t in themes" :key="t.id">
            <button
              @click="applyTheme(t.id)"
              :title="t.label"
              :aria-label="t.label"
              class="relative h-9 w-9 rounded-full transition-transform hover:scale-110 focus:outline-none ring-offset-2 ring-offset-gray-800"
              :class="theme === t.id ? 'ring-2 ring-white' : 'ring-1 ring-white/10'"
              :style="`background-color:${t.swatch}`"
            >
              <svg
                x-show="theme === t.id"
                class="absolute inset-0 m-auto w-4 h-4 text-white drop-shadow"
                fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </button>
          </template>
        </div>
      </div>
    </div>
  </div>
</div>
