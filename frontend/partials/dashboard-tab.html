<div x-show="activeTab === 'dashboard'" class="container mx-auto px-4 py-6 max-w-6xl">

  <!-- Not connected -->
  <div x-show="!sfStatus.connected" class="flex flex-col items-center justify-center py-20 text-center">
    <div class="text-5xl mb-4">🔌</div>
    <h2 class="text-xl font-semibold text-gray-300 mb-2">Not Connected</h2>
    <p class="text-gray-500 mb-6 text-sm">Connect to your Satisfactory dedicated server to get started.</p>
    <button
      @click="showConnectModal = true"
      class="px-5 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-medium transition-colors text-sm"
    >
      Connect to Server
    </button>
  </div>

  <!-- Connected -->
  <div x-show="sfStatus.connected">

    <!-- Action result banner -->
    <div
      x-show="actionResult"
      x-transition
      :class="actionResult?.ok ? 'bg-green-900/30 border-green-800 text-green-300' : 'bg-red-900/30 border-red-800 text-red-300'"
      class="p-3 border rounded-lg text-sm mb-5 flex items-center justify-between"
    >
      <span x-text="actionResult?.message"></span>
      <button @click="actionResult = null" class="text-current opacity-60 hover:opacity-100 ml-4">✕</button>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-16">
      <div class="text-gray-500 text-sm animate-pulse">Loading server state…</div>
    </div>

    <!-- Error -->
    <div
      x-show="error && !loading"
      class="p-4 bg-red-900/30 border border-red-800 rounded-lg text-red-300 text-sm mb-5"
      x-text="error"
    ></div>

    <!-- Data -->
    <div x-show="serverState && !loading">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-semibold text-gray-200">Server Dashboard</h2>
        <button @click="loadDashboard()" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">↻ Refresh</button>
      </div>

      <!-- Stat cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Players</div>
          <div class="text-2xl font-bold text-orange-400">
            <span x-text="serverState?.serverGameState?.numConnectedPlayers ?? '—'"></span>
            <span class="text-sm text-gray-500"> / </span>
            <span class="text-sm text-gray-400" x-text="serverState?.serverGameState?.playerLimit ?? '—'"></span>
          </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Tech Tier</div>
          <div class="text-2xl font-bold text-orange-400" x-text="serverState?.serverGameState?.techTier ?? '—'"></div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Tick Rate</div>
          <div class="text-2xl font-bold text-orange-400">
            <span x-text="serverState?.serverGameState?.averageTickRate?.toFixed(1) ?? '—'"></span>
            <span class="text-sm text-gray-500">/s</span>
          </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Status</div>
          <div class="mt-1 text-sm font-semibold">
            <span x-show="serverState?.serverGameState?.isGameRunning && !serverState?.serverGameState?.isGamePaused" class="text-green-400">● Running</span>
            <span x-show="serverState?.serverGameState?.isGamePaused" class="text-yellow-400">⏸ Paused</span>
            <span x-show="!serverState?.serverGameState?.isGameRunning" class="text-gray-500">○ Idle</span>
          </div>
        </div>
      </div>

      <!-- Session details -->
      <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Session</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-y-3 gap-x-8 text-sm">
          <div class="flex justify-between border-b border-gray-700/50 pb-2">
            <span class="text-gray-400">Active Session</span>
            <span class="text-white font-medium" x-text="serverState?.serverGameState?.activeSessionName || '—'"></span>
          </div>
          <div class="flex justify-between border-b border-gray-700/50 pb-2">
            <span class="text-gray-400">Auto-Load</span>
            <span class="text-white" x-text="serverState?.serverGameState?.autoLoadSessionName || '—'"></span>
          </div>
          <div class="flex justify-between items-start gap-4 border-b border-gray-700/50 pb-2">
            <span class="text-gray-400 shrink-0">Game Phase</span>
            <span class="text-white text-right" x-text="formatUEPath(serverState?.serverGameState?.gamePhase)"></span>
          </div>
          <div class="flex justify-between items-start gap-4 border-b border-gray-700/50 pb-2">
            <span class="text-gray-400 shrink-0">Active Schematic</span>
            <span class="text-white text-right" x-text="formatUEPath(serverState?.serverGameState?.activeSchematic)"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">Total Playtime</span>
            <span class="text-white" x-text="formatDuration(serverState?.serverGameState?.totalGameDuration)"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">Game Paused</span>
            <span :class="serverState?.serverGameState?.isGamePaused ? 'text-yellow-400' : 'text-gray-400'">
              <span x-text="serverState?.serverGameState?.isGamePaused ? 'Yes' : 'No'"></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
