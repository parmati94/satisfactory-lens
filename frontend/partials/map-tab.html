<div x-show="activeTab === 'map'" class="flex flex-col" style="height: calc(100vh - 98px);">

  <!-- Status bar -->
  <div class="flex-shrink-0 flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 text-xs text-gray-400">
    <div class="flex items-center gap-3">
      <span x-show="saveStatus?.loaded" class="flex items-center gap-2">
        <span class="text-gray-200 font-medium" x-text="saveStatus?.sourceName"></span>
        <span x-show="svPlayers?.length" class="text-orange-400">
          · <span x-text="svPlayers?.length"></span> player<span x-show="svPlayers?.length !== 1">s</span> on map
        </span>
        <span x-show="svPlayers !== null && !svPlayers?.length" class="text-gray-500">· No players in save</span>
      </span>
      <span x-show="!saveStatus?.loaded" class="text-gray-500">
        No save loaded — load a save in <button @click="switchTab('saveviewer')" class="underline hover:text-gray-300 transition-colors">Save Viewer</button> to show player positions
      </span>
    </div>
    <span x-show="svMapPins?.stamps?.length" class="text-gray-500">
      · <span x-text="svMapPins?.stamps?.length ?? 0"></span> stamp<span x-show="(svMapPins?.stamps?.length ?? 0) !== 1">s</span>
    </span>
  </div>

  <!-- Padded viewport -->
  <div class="flex-1 min-h-0 p-4 bg-gray-950">

    <!-- Map wrapper — overlays are siblings of #leaflet-map inside this relative container -->
    <div class="h-full w-full relative rounded-xl overflow-hidden border border-gray-800">

      <!-- Leaflet map fills the wrapper -->
      <div id="leaflet-map" class="h-full w-full" style="background: #030712;"></div>


      <!-- ── Filter panel — top-left ─────────────────────────────────────── -->
      <div class="absolute top-4 left-4 flex flex-col gap-1.5" style="z-index:1000">

        <!-- Toggle button -->
        <button @click="toggleMapFilters()"
          title="Layer filters"
          class="w-10 h-10 flex items-center justify-center rounded-xl border backdrop-blur-md shadow-xl transition-all hover:scale-110"
          :class="mapFiltersOpen
            ? 'bg-orange-500/20 border-orange-400/40 shadow-orange-900/20'
            : 'bg-gray-900/95 border-gray-700/50 hover:bg-orange-500/10 hover:border-orange-500/30'">
          <svg style="width:17px;height:17px" :class="mapFiltersOpen ? 'text-orange-300' : 'text-gray-300'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
          </svg>
        </button>

        <!-- Filter panel -->
        <div x-show="mapFiltersOpen"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-95 -translate-y-1"
             class="bg-gray-900/95 backdrop-blur-md rounded-xl border border-gray-700/50 shadow-2xl p-2 w-48">

          <!-- OVERLAYS section -->
          <p class="text-[10px] font-semibold uppercase tracking-widest text-gray-500 px-2 pt-1 pb-0.5">Overlays</p>

          <!-- Players row -->
          <button @click="toggleMapFilter('players')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.players ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.players ? 'bg-orange-500/20 border-orange-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.players ? 'text-orange-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.players ? 'text-gray-200' : 'text-gray-500'">Players</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svPlayers?.length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.players ? 'bg-orange-500 border-orange-500' : 'border-gray-600'">
              <svg x-show="mapFilters.players" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- HUB row -->
          <button @click="toggleMapFilter('hub')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.hub ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.hub ? 'bg-orange-500/20 border-orange-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.hub ? 'text-orange-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4v-4h2v4h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.hub ? 'text-gray-200' : 'text-gray-500'">HUB</span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.hub ? 'bg-orange-500 border-orange-500' : 'border-gray-600'">
              <svg x-show="mapFilters.hub" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Map Stamps row -->
          <button @click="toggleMapFilter('stamps')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.stamps ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.stamps ? 'bg-orange-500/20 border-orange-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.stamps ? 'text-orange-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 24 24" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.stamps ? 'text-gray-200' : 'text-gray-500'">Map Stamps</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svMapPins?.stamps?.length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.stamps ? 'bg-orange-500 border-orange-500' : 'border-gray-600'">
              <svg x-show="mapFilters.stamps" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Buildings row -->
          <button @click="toggleMapFilter('buildings')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.buildings ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.buildings ? 'bg-orange-500/20 border-orange-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.buildings ? 'text-orange-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V3zm2 1v2h2V4H5zM3 12a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zm2 1v2h2v-2H5zM12 3a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V3zm2 1v2h2V4h-2zM12 12a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4zm2 1v2h2v-2h-2z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.buildings ? 'text-gray-200' : 'text-gray-500'">Buildings</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svBuildingFootprints?.x?.length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.buildings ? 'bg-orange-500 border-orange-500' : 'border-gray-600'">
              <svg x-show="mapFilters.buildings" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Divider -->
          <div class="border-t border-gray-700/50 my-1.5 mx-1"></div>

          <!-- RESOURCE NODES section -->
          <p class="text-[10px] font-semibold uppercase tracking-widest text-gray-500 px-2 pb-0.5">Resource Nodes</p>

          <!-- All nodes master -->
          <button @click="toggleAllNodes()"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70"
            :class="(mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure) ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="(mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure) ? 'bg-orange-500/20 border-orange-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <!-- Resource node icon (sun/radial) -->
              <svg :class="(mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure) ? 'text-orange-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="(mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure) ? 'text-gray-200' : 'text-gray-500'">All Nodes</span>
            <span class="text-[10px] text-gray-600 tabular-nums"
                  x-text="'(' + (svResourceNodes?.filter(n => n.icon).length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="(mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure)
                   ? ((mapFilters.purityImpure && mapFilters.purityNormal && mapFilters.purityPure) ? 'bg-orange-500 border-orange-500' : 'bg-orange-500/40 border-orange-500/60')
                   : 'border-gray-600'">
              <svg x-show="mapFilters.purityImpure || mapFilters.purityNormal || mapFilters.purityPure" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Purity sub-filters -->
          <div class="pl-2 mt-0.5 space-y-0.5">

            <button @click="toggleMapFilter('purityImpure')"
              class="w-full flex items-center gap-2 px-2 py-1 rounded-lg transition-all hover:bg-gray-800/60"
              :class="mapFilters.purityImpure ? 'bg-gray-800/30' : ''">
              <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 transition-opacity border"
                    :class="mapFilters.purityImpure ? 'bg-red-500 border-red-400' : 'bg-transparent border-red-500/40'"
                    style="min-width:10px"></span>
              <span class="text-xs flex-1 text-left transition-colors"
                    :class="mapFilters.purityImpure ? 'text-gray-300' : 'text-gray-600'">Impure</span>
              <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + nodeCountByPurity('Impure') + ')'"></span>
              <div class="w-3 h-3 rounded-sm border flex-shrink-0 flex items-center justify-center transition-all"
                   :class="mapFilters.purityImpure ? 'bg-red-500/80 border-red-500' : 'border-gray-600'">
                <svg x-show="mapFilters.purityImpure" fill="none" stroke="white" viewBox="0 0 24 24" style="width:7px;height:7px">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </button>

            <button @click="toggleMapFilter('purityNormal')"
              class="w-full flex items-center gap-2 px-2 py-1 rounded-lg transition-all hover:bg-gray-800/60"
              :class="mapFilters.purityNormal ? 'bg-gray-800/30' : ''">
              <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 transition-opacity border"
                    :class="mapFilters.purityNormal ? 'bg-yellow-500 border-yellow-400' : 'bg-transparent border-yellow-500/40'"
                    style="min-width:10px"></span>
              <span class="text-xs flex-1 text-left transition-colors"
                    :class="mapFilters.purityNormal ? 'text-gray-300' : 'text-gray-600'">Normal</span>
              <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + nodeCountByPurity('Normal') + ')'"></span>
              <div class="w-3 h-3 rounded-sm border flex-shrink-0 flex items-center justify-center transition-all"
                   :class="mapFilters.purityNormal ? 'bg-yellow-500/80 border-yellow-500' : 'border-gray-600'">
                <svg x-show="mapFilters.purityNormal" fill="none" stroke="white" viewBox="0 0 24 24" style="width:7px;height:7px">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </button>

            <button @click="toggleMapFilter('purityPure')"
              class="w-full flex items-center gap-2 px-2 py-1 rounded-lg transition-all hover:bg-gray-800/60"
              :class="mapFilters.purityPure ? 'bg-gray-800/30' : ''">
              <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 transition-opacity border"
                    :class="mapFilters.purityPure ? 'bg-green-500 border-green-400' : 'bg-transparent border-green-500/40'"
                    style="min-width:10px"></span>
              <span class="text-xs flex-1 text-left transition-colors"
                    :class="mapFilters.purityPure ? 'text-gray-300' : 'text-gray-600'">Pure</span>
              <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + nodeCountByPurity('Pure') + ')'"></span>
              <div class="w-3 h-3 rounded-sm border flex-shrink-0 flex items-center justify-center transition-all"
                   :class="mapFilters.purityPure ? 'bg-green-500/80 border-green-500' : 'border-gray-600'">
                <svg x-show="mapFilters.purityPure" fill="none" stroke="white" viewBox="0 0 24 24" style="width:7px;height:7px">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </button>

          </div>

        </div>
      </div>
      <!-- ────────────────────────────────────────────────────────────────── -->

      <!-- ── Right-side controls ────────────────────────────────────────── -->
      <div class="absolute top-4 right-4 flex flex-col gap-2" style="z-index:1000">

        <!-- Home / reset view -->
        <button @click="mapResetView()" title="Reset view"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-orange-500/20 hover:border-orange-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-orange-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </button>

        <!-- Refresh markers -->
        <button @click="mapRefresh()" title="Refresh markers" :disabled="mapRefreshing"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-orange-500/20 hover:border-orange-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:scale-100">
          <svg :class="['text-gray-300 group-hover:text-orange-300 transition-all', mapRefreshing ? 'animate-spin text-orange-300' : 'group-hover:rotate-180 duration-500']"
               fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="h-px bg-gray-700/50 mx-1"></div>

        <!-- Zoom in -->
        <button @click="mapZoomIn()" title="Zoom in"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-orange-500/20 hover:border-orange-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-orange-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
          </svg>
        </button>

        <!-- Zoom out -->
        <button @click="mapZoomOut()" title="Zoom out"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-orange-500/20 hover:border-orange-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-orange-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"/>
          </svg>
        </button>

      </div>
      <!-- ────────────────────────────────────────────────────────────────── -->

    </div>
  </div>

</div>
