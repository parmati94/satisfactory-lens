<div x-show="activeTab === 'map'" class="flex flex-col" style="height: calc(100vh - 98px);">

  <!-- Padded viewport -->
  <div class="flex-1 min-h-0 p-4 bg-gray-950">

    <!-- Map wrapper — overlays are siblings of #leaflet-map inside this relative container -->
    <div class="h-full w-full relative rounded-xl overflow-hidden border border-gray-800">

      <!-- Leaflet map fills the wrapper -->
      <div id="leaflet-map" class="h-full w-full" style="background: #030712;"></div>

      <!-- Context pill — top-center: what save you're looking at + quick counts -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 max-w-[calc(100%-7rem)] flex items-center gap-2.5 px-3.5 py-1.5 rounded-xl bg-gray-900/90 backdrop-blur-md border border-gray-700/50 shadow-xl text-xs pointer-events-none"
           style="z-index:1000">
        <template x-if="saveStatus?.loaded">
          <div class="flex items-center gap-2.5 min-w-0">
            <svg class="w-3.5 h-3.5 text-accent-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8a2 2 0 012-2h10a2 2 0 012 2M5 8a2 2 0 00-2 2v6a2 2 0 002 2h14a2 2 0 002-2v-6a2 2 0 00-2-2M5 8h14M9 12h6" />
            </svg>
            <span class="text-gray-200 font-medium truncate" x-text="saveStatus?.sourceName"></span>
            <span class="w-px h-3.5 bg-gray-700 shrink-0"></span>
            <span class="flex items-center gap-1.5 shrink-0 tabular-nums">
              <span x-show="svPlayers?.length" class="text-accent-300">
                <span x-text="svPlayers?.length"></span> player<span x-show="svPlayers?.length !== 1">s</span>
              </span>
              <span x-show="svPlayers !== null && !svPlayers?.length" class="text-gray-500">No players</span>
              <span x-show="svMapPins?.stamps?.length" class="text-gray-600">·</span>
              <span x-show="svMapPins?.stamps?.length" class="text-gray-400">
                <span x-text="svMapPins?.stamps?.length ?? 0"></span> stamp<span x-show="(svMapPins?.stamps?.length ?? 0) !== 1">s</span>
              </span>
            </span>
          </div>
        </template>
        <template x-if="!saveStatus?.loaded">
          <div class="flex items-center gap-1.5 text-gray-500 pointer-events-auto">
            <span>No save loaded —</span>
            <button @click="switchTab('saveviewer')" class="text-accent-300 hover:text-accent-200 font-medium transition-colors">Load in Save Tools</button>
          </div>
        </template>
      </div>

      <!-- Live coordinate readout — bottom-left, follows the cursor's map position -->
      <div x-show="mouseCoord.x !== null"
           class="absolute bottom-4 left-4 flex items-center gap-2.5 px-3 py-1.5 rounded-lg bg-gray-900/90 backdrop-blur-md border border-gray-700/50 shadow-lg font-mono text-xs pointer-events-none"
           style="z-index:1000">
        <span class="text-gray-500">X</span>
        <span class="text-gray-200 tabular-nums" x-text="((mouseCoord.x ?? 0) / 100).toFixed(0) + ' m'"></span>
        <span class="text-gray-700">·</span>
        <span class="text-gray-500">Y</span>
        <span class="text-gray-200 tabular-nums" x-text="((mouseCoord.y ?? 0) / 100).toFixed(0) + ' m'"></span>
      </div>


      <!-- ── Filter panel — top-left ─────────────────────────────────────── -->
      <div class="absolute top-4 left-4 flex flex-col gap-1.5" style="z-index:1000">

        <!-- Toggle button -->
        <button @click="toggleMapFilters()"
          title="Layer filters"
          class="w-10 h-10 flex items-center justify-center rounded-xl border backdrop-blur-md shadow-xl transition-all hover:scale-110"
          :class="mapFiltersOpen
            ? 'bg-accent-500/20 border-accent-400/40 shadow-accent-900/20'
            : 'bg-gray-900/95 border-gray-700/50 hover:bg-accent-500/10 hover:border-accent-500/30'">
          <svg style="width:17px;height:17px" :class="mapFiltersOpen ? 'text-accent-300' : 'text-gray-300'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
          </svg>
        </button>

        <!-- Filter panel -->
        <div x-show="mapFiltersOpen"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-95 -translate-y-1"
             class="bg-gray-900/95 backdrop-blur-md rounded-xl border border-gray-700/50 shadow-2xl p-2 w-52 max-h-[calc(100vh-9rem)] overflow-y-auto">

          <!-- OVERLAYS section (collapsible) -->
          <button @click="toggleMapSection('overlays')"
            class="w-full flex items-center justify-between px-2 pt-1 pb-1 rounded-lg hover:bg-gray-800/40 transition-colors">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-gray-500">Overlays</span>
            <svg class="text-gray-600 transition-transform duration-150" :class="mapSections.overlays ? 'rotate-90' : ''"
                 width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </button>

          <div x-show="mapSections.overlays">
          <!-- Players row -->
          <button @click="toggleMapFilter('players')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.players ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.players ? 'bg-accent-500/20 border-accent-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.players ? 'text-accent-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.players ? 'text-gray-200' : 'text-gray-500'">Players</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svPlayers?.length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.players ? 'bg-accent-500 border-accent-500' : 'border-gray-600'">
              <svg x-show="mapFilters.players" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- HUB row -->
          <button @click="toggleMapFilter('hub')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.hub ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.hub ? 'bg-accent-500/20 border-accent-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.hub ? 'text-accent-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4v-4h2v4h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.hub ? 'text-gray-200' : 'text-gray-500'">HUB</span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.hub ? 'bg-accent-500 border-accent-500' : 'border-gray-600'">
              <svg x-show="mapFilters.hub" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Map Stamps row -->
          <button @click="toggleMapFilter('stamps')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.stamps ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.stamps ? 'bg-accent-500/20 border-accent-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.stamps ? 'text-accent-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 24 24" style="width:11px;height:11px">
                <path fill-rule="evenodd" d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.stamps ? 'text-gray-200' : 'text-gray-500'">Map Stamps</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svMapPins?.stamps?.length ?? 0) + ')'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.stamps ? 'bg-accent-500 border-accent-500' : 'border-gray-600'">
              <svg x-show="mapFilters.stamps" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          <!-- Fog of War row — blacks out terrain the player hasn't explored -->
          <button @click="toggleMapFilter('fog')"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg transition-all hover:bg-gray-800/70 group"
            :class="mapFilters.fog ? 'bg-gray-800/40' : ''">
            <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border transition-all"
                 :class="mapFilters.fog ? 'bg-accent-500/20 border-accent-500/40' : 'bg-gray-800/60 border-gray-700/50'">
              <svg :class="mapFilters.fog ? 'text-accent-300' : 'text-gray-500'" fill="currentColor" viewBox="0 0 20 20" style="width:11px;height:11px">
                <path d="M5.5 13a3.5 3.5 0 01-.5-6.96A4.5 4.5 0 0114 7.5a3 3 0 01-.5 5.95V13H5.5z"/>
              </svg>
            </div>
            <span class="text-xs font-medium flex-1 text-left transition-colors"
                  :class="mapFilters.fog ? 'text-gray-200' : 'text-gray-500'">Fog of War</span>
            <span class="text-[10px] text-gray-600 tabular-nums" x-text="mapFilters.fog ? 'explored' : 'full map'"></span>
            <div class="w-3.5 h-3.5 rounded-sm border-2 flex-shrink-0 flex items-center justify-center transition-all"
                 :class="mapFilters.fog ? 'bg-accent-500 border-accent-500' : 'border-gray-600'">
              <svg x-show="mapFilters.fog" fill="none" stroke="white" viewBox="0 0 24 24" style="width:8px;height:8px">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </button>

          </div>

          <!-- Divider -->
          <div class="border-t border-gray-700/50 my-1.5 mx-1"></div>

          <!-- BUILDINGS section (collapsible, per-category) -->
          <button @click="toggleMapSection('buildings')"
            class="w-full flex items-center justify-between px-2 pt-1 pb-1 rounded-lg hover:bg-gray-800/40 transition-colors">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-gray-500">Buildings</span>
            <span class="flex items-center gap-1.5">
              <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svBuildingFootprints?.x?.length ?? 0) + ')'"></span>
              <svg class="text-gray-600 transition-transform duration-150" :class="mapSections.buildings ? 'rotate-90' : ''"
                   width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </span>
          </button>

          <div x-show="mapSections.buildings" class="mt-0.5">
            <div class="flex items-center justify-between px-2 pb-0.5">
              <span class="text-[10px] text-gray-500">Categories</span>
              <button @click="toggleAllBuildingCategories()"
                class="text-[10px] font-medium text-gray-500 hover:text-accent-300 transition-colors"
                x-text="buildingCategoriesAllOn() ? 'None' : 'All'"></button>
            </div>
            <template x-for="c in buildingCategories" :key="c.category">
              <div class="w-full flex items-center gap-2 px-2 py-1 rounded-lg transition-all hover:bg-gray-800/60"
                :class="categoryFilters[c.category] ? 'bg-gray-800/30' : ''">
                <!-- Swatch: opens the dark color popover for sprite categories, a static dot for spline ones -->
                <template x-if="c.recolorable">
                  <button @click.stop="openColorPicker(c.category, $event)" title="Click to recolor"
                          class="group/sw relative flex-shrink-0 leading-none rounded-md p-1 -m-0.5 hover:bg-gray-700/60 transition-colors">
                    <span class="block w-3 h-3 rounded-full ring-1 ring-white/25 transition-transform group-hover/sw:scale-110"
                          :style="categoryFilters[c.category] ? ('background-color:' + effectiveCategoryColor(c.category)) : ('background-color:transparent;box-shadow:inset 0 0 0 2px ' + effectiveCategoryColor(c.category))"></span>
                    <!-- tiny pencil badge so it reads as editable -->
                    <span class="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-gray-800 ring-1 ring-gray-600 flex items-center justify-center text-gray-300 opacity-80 group-hover/sw:opacity-100">
                      <svg width="6" height="6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </span>
                  </button>
                </template>
                <template x-if="!c.recolorable">
                  <span class="w-3 h-3 mx-1 rounded-full flex-shrink-0 border transition-opacity"
                        :style="categoryFilters[c.category] ? ('background-color:' + c.color + ';border-color:' + c.color) : ('background-color:transparent;border-color:' + c.color + '80')"></span>
                </template>
                <!-- Toggle visibility -->
                <button @click="toggleBuildingCategory(c.category)" class="flex items-center gap-2 flex-1 min-w-0 text-left">
                  <span class="text-xs flex-1 truncate transition-colors"
                        :class="categoryFilters[c.category] ? 'text-gray-300' : 'text-gray-600'" x-text="c.category"></span>
                  <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + c.count + ')'"></span>
                  <span x-show="hasCategoryColorOverride(c.category)" title="Custom color"
                        class="w-1 h-1 rounded-full bg-accent-400 flex-shrink-0"></span>
                  <div class="w-3 h-3 rounded-sm border flex-shrink-0 flex items-center justify-center transition-all"
                       :class="categoryFilters[c.category] ? 'bg-accent-500/80 border-accent-500' : 'border-gray-600'">
                    <svg x-show="categoryFilters[c.category]" fill="none" stroke="white" viewBox="0 0 24 24" style="width:7px;height:7px">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"/>
                    </svg>
                  </div>
                </button>
              </div>
            </template>
          </div>

          <!-- Divider -->
          <div class="border-t border-gray-700/50 my-1.5 mx-1"></div>

          <!-- RESOURCE NODES section (collapsible) -->
          <button @click="toggleMapSection('nodes')"
            class="w-full flex items-center justify-between px-2 pt-1 pb-1 rounded-lg hover:bg-gray-800/40 transition-colors">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-gray-500">Resource Nodes</span>
            <span class="flex items-center gap-1.5">
              <span class="text-[10px] text-gray-600 tabular-nums" x-text="'(' + (svResourceNodes?.filter(n => n.icon).length ?? 0) + ')'"></span>
              <svg class="text-gray-600 transition-transform duration-150" :class="mapSections.nodes ? 'rotate-90' : ''"
                   width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </span>
          </button>

          <div x-show="mapSections.nodes" class="mt-0.5">

            <!-- Purity (compact pills) -->
            <div class="flex gap-1 px-1 pb-1">
              <button @click="toggleMapFilter('purityImpure')" :title="'Impure (' + nodeCountByPurity('Impure') + ')'"
                class="flex-1 flex items-center justify-center gap-1 px-1 py-1 rounded-md border text-[10px] font-medium transition-all"
                :class="mapFilters.purityImpure ? 'bg-danger-500/15 border-danger-500/50 text-gray-200' : 'bg-gray-800/40 border-gray-700/50 text-gray-500'">
                <span class="w-1.5 h-1.5 rounded-full" :class="mapFilters.purityImpure ? 'bg-danger-500' : 'bg-gray-600'"></span>Impure
              </button>
              <button @click="toggleMapFilter('purityNormal')" :title="'Normal (' + nodeCountByPurity('Normal') + ')'"
                class="flex-1 flex items-center justify-center gap-1 px-1 py-1 rounded-md border text-[10px] font-medium transition-all"
                :class="mapFilters.purityNormal ? 'bg-warn-500/15 border-warn-500/50 text-gray-200' : 'bg-gray-800/40 border-gray-700/50 text-gray-500'">
                <span class="w-1.5 h-1.5 rounded-full" :class="mapFilters.purityNormal ? 'bg-warn-500' : 'bg-gray-600'"></span>Normal
              </button>
              <button @click="toggleMapFilter('purityPure')" :title="'Pure (' + nodeCountByPurity('Pure') + ')'"
                class="flex-1 flex items-center justify-center gap-1 px-1 py-1 rounded-md border text-[10px] font-medium transition-all"
                :class="mapFilters.purityPure ? 'bg-ok-500/15 border-ok-500/50 text-gray-200' : 'bg-gray-800/40 border-gray-700/50 text-gray-500'">
                <span class="w-1.5 h-1.5 rounded-full" :class="mapFilters.purityPure ? 'bg-ok-500' : 'bg-gray-600'"></span>Pure
              </button>
            </div>

            <!-- Type (icon chip grid) -->
            <div class="flex items-center justify-between px-2 pt-1 pb-0.5">
              <span class="text-[10px] text-gray-500">Type</span>
              <button @click="toggleAllNodeTypes()"
                class="text-[10px] font-medium text-gray-500 hover:text-accent-300 transition-colors"
                x-text="nodeTypesAllOn() ? 'None' : 'All'"></button>
            </div>
            <div class="grid grid-cols-4 gap-1 px-1 pb-1">
              <template x-for="t in nodeTypeList()" :key="t.key">
                <button @click="toggleNodeType(t.key)" :title="t.label + ' (' + t.count + ')'"
                  class="aspect-square rounded-md border flex items-center justify-center p-1 transition-all"
                  :class="nodeTypeFilters[t.key] ? 'bg-accent-500/15 border-accent-500/50' : 'bg-gray-800/40 border-gray-700/50 hover:border-gray-600'">
                  <img :src="'/assets/resources/' + t.icon"
                       class="w-full h-full object-contain transition-all"
                       :class="nodeTypeFilters[t.key] ? '' : 'grayscale opacity-40'">
                </button>
              </template>
            </div>

          </div>

        </div>
      </div>
      <!-- ────────────────────────────────────────────────────────────────── -->

      <!-- ── Right-side controls ────────────────────────────────────────── -->
      <div class="absolute top-4 right-4 flex flex-col gap-2" style="z-index:1000">

        <!-- Home / reset view -->
        <button @click="mapResetView()" title="Reset view"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-accent-500/20 hover:border-accent-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-accent-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </button>

        <!-- Refresh markers -->
        <button @click="mapRefresh()" title="Refresh markers" :disabled="mapRefreshing"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-accent-500/20 hover:border-accent-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:scale-100">
          <svg :class="['text-gray-300 group-hover:text-accent-300 transition-all', mapRefreshing ? 'animate-spin text-accent-300' : 'group-hover:rotate-180 duration-500']"
               fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="h-px bg-gray-700/50 mx-1"></div>

        <!-- Zoom in -->
        <button @click="mapZoomIn()" title="Zoom in"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-accent-500/20 hover:border-accent-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-accent-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
          </svg>
        </button>

        <!-- Zoom out -->
        <button @click="mapZoomOut()" title="Zoom out"
          class="group w-10 h-10 bg-gray-900/95 hover:bg-accent-500/20 hover:border-accent-400/40 text-white rounded-xl shadow-xl transition-all hover:scale-110 backdrop-blur-md flex items-center justify-center border border-gray-700/50">
          <svg class="text-gray-300 group-hover:text-accent-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:17px;height:17px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"/>
          </svg>
        </button>

      </div>
      <!-- ────────────────────────────────────────────────────────────────── -->

    </div>
  </div>

  <!-- ── Category color picker — dark popover, fixed-anchored to the swatch ─── -->
  <div x-show="colorPicker.open"
       x-transition:enter="transition ease-out duration-100"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-75"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       @click.outside="closeColorPicker()"
       @keydown.escape.window="closeColorPicker()"
       class="fixed w-60 bg-gray-800 rounded-xl border border-gray-700 shadow-2xl p-3"
       :style="`top:${colorPicker.top}px; left:${colorPicker.left}px; z-index:1100`"
       x-cloak>
    <div class="flex items-center justify-between mb-2.5">
      <div class="min-w-0">
        <div class="text-[10px] font-semibold uppercase tracking-widest text-gray-500 leading-none mb-1">Color</div>
        <div class="text-xs font-medium text-gray-200 truncate" x-text="colorPicker.category"></div>
      </div>
      <button @click="closeColorPicker()" class="p-1 -m-1 text-gray-500 hover:text-gray-300 rounded-md hover:bg-gray-700/60 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Saturation / Value box -->
    <div class="relative w-full h-28 rounded-lg overflow-hidden cursor-crosshair select-none touch-none mb-2.5 ring-1 ring-white/10"
         @pointerdown="pickerSVDown($event)"
         :style="`background:
            linear-gradient(to top, #000, transparent),
            linear-gradient(to right, #fff, transparent),
            ${pickerHueHex()}`">
      <span class="absolute w-3.5 h-3.5 -ml-1.5 -mt-1.5 rounded-full border-2 border-white shadow pointer-events-none"
            :style="`left:${colorPicker.s * 100}%; top:${(1 - colorPicker.v) * 100}%; background:${pickerHex()}`"></span>
    </div>

    <!-- Hue slider -->
    <div class="relative w-full h-3.5 rounded-full cursor-pointer select-none touch-none mb-2.5 ring-1 ring-white/10"
         @pointerdown="pickerHueDown($event)"
         style="background:linear-gradient(to right,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%)">
      <span class="absolute top-1/2 -translate-y-1/2 w-3.5 h-3.5 -ml-1.5 rounded-full border-2 border-white shadow pointer-events-none"
            :style="`left:${(colorPicker.h / 360) * 100}%; background:${pickerHueHex()}`"></span>
    </div>

    <!-- Hex input + live preview -->
    <div class="flex items-center gap-2 mb-2.5">
      <span class="w-7 h-7 rounded-md ring-1 ring-white/15 shrink-0" :style="`background-color:${pickerHex()}`"></span>
      <input type="text" maxlength="7" spellcheck="false"
             :value="pickerHex()"
             @input="pickerSetHex($event.target.value)"
             class="flex-1 min-w-0 bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs font-mono text-gray-200 uppercase focus:outline-none focus:border-accent-500 transition-colors">
    </div>

    <!-- Preset quick-picks -->
    <div class="grid grid-cols-9 gap-1.5 mb-2.5">
      <template x-for="hex in mapColorPresets" :key="hex">
        <button @click="pickerPick(hex)"
                class="aspect-square rounded transition-transform hover:scale-110"
                :style="`background-color:${hex}`"
                :class="pickerHex() === hex ? 'ring-2 ring-white' : 'ring-1 ring-white/15'"></button>
      </template>
    </div>

    <!-- Reset -->
    <button @click="pickerReset()"
            x-show="hasCategoryColorOverride(colorPicker.category)"
            class="w-full flex items-center justify-center gap-1.5 py-1.5 rounded-md border border-gray-700 text-xs font-medium text-gray-400 hover:text-gray-200 hover:border-gray-600 transition-colors">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Reset to default
    </button>
  </div>

</div>
