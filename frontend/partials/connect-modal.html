<!-- Connect modal -->
<div
  x-show="showConnectModal"
  x-transition:enter="transition ease-out duration-150"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-100"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1100] flex items-center justify-center p-4"
  @click.self="showConnectModal = false"
  @keydown.escape.window="showConnectModal = false"
>
  <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 shadow-2xl">
    <h2 class="text-lg font-bold mb-1">Connect to Server</h2>
    <p class="text-sm text-gray-400 mb-5">Enter your Satisfactory dedicated server details.</p>

    <div class="space-y-4">
      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-2">
          <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wide">Host / IP</label>
          <input
            type="text"
            x-model="connectForm.host"
            placeholder="192.168.1.100"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-orange-400 transition-colors"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wide">Port</label>
          <input
            type="number"
            x-model="connectForm.port"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-orange-400 transition-colors"
          />
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wide">Admin Password</label>
        <input
          type="password"
          x-model="connectForm.password"
          placeholder="Leave blank if no password set"
          @keydown.enter="connectToSF()"
          class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-orange-400 transition-colors"
        />
      </div>
    </div>

    <div
      x-show="connectError"
      class="mt-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm"
      x-text="connectError"
    ></div>

    <div class="flex gap-3 mt-5">
      <button
        @click="showConnectModal = false; connectError = null"
        class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm transition-colors"
      >
        Cancel
      </button>
      <button
        @click="connectToSF()"
        :disabled="connectLoading || !connectForm.host"
        class="flex-1 px-4 py-2 bg-orange-500 hover:bg-orange-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-colors"
      >
        <span x-show="!connectLoading">Connect</span>
        <span x-show="connectLoading">Connecting…</span>
      </button>
    </div>
  </div>
</div>
