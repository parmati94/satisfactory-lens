<!-- Global tooltip (item slots, header controls, etc.) -->
<div
  x-ref="tooltipBox"
  x-show="tooltip.visible"
  x-transition:enter="transition ease-out duration-75"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  :style="tooltip.placement === 'bottom'
    ? `position:fixed;left:${tooltip.x}px;top:${tooltip.y + 8}px;transform:translate(-50%,0)`
    : `position:fixed;left:${tooltip.x}px;top:${tooltip.y - 8}px;transform:translate(-50%,-100%)`"
  class="z-[9999] pointer-events-none"
>
  <div x-show="tooltip.placement === 'bottom'" class="w-2 h-2 bg-gray-900 border-l border-t border-gray-700 rotate-45 mx-auto -mb-1"></div>
  <div class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 shadow-xl whitespace-nowrap">
    <p class="text-xs font-semibold text-white" x-text="tooltip.name"></p>
    <p x-show="tooltip.count !== null" class="text-xs text-gray-400 mt-0.5" x-text="'× ' + (tooltip.count ?? 0).toLocaleString()"></p>
  </div>
  <div x-show="tooltip.placement !== 'bottom'" class="w-2 h-2 bg-gray-900 border-r border-b border-gray-700 rotate-45 mx-auto -mt-1"></div>
</div>

</div>
</body>
</html>
